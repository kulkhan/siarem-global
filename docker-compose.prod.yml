services:
  postgres:
    image: postgres:16-alpine
    container_name: oddycrm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-oddycrm}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-oddycrm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-oddycrm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oddycrm_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-oddycrm}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-oddycrm}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: production
      UPLOAD_DIR: ./uploads
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.siarem.com}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    command: >
      sh -c "npx prisma migrate deploy && node dist/server.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY}
    container_name: oddycrm_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  postgres_data:
  uploads_data:

networks:
  internal:
    driver: bridge
