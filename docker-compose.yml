services:
  postgres:
    image: postgres:16-alpine
    container_name: oddycrm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: oddycrm
      POSTGRES_PASSWORD: oddycrm_pass
      POSTGRES_DB: oddycrm
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
